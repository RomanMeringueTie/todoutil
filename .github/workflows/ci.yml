name: todo CI

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go 1.22.2
        uses: actions/setup-go@v5
        with:
          go-version: 1.22.2
      - name: Build app
        run: make
      - name: Test app
        run: make test_CI
      - name: Report tests
        uses: becheran/go-testreport@main
        with:
          input: TestResults.json